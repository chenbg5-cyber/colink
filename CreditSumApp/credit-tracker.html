<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>מעקב אשראי</title>
  <link rel="manifest" href="manifest-credit.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icons/credit-icon-192.png">
  <link rel="apple-touch-icon" href="icons/credit-icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-border: #2a2a4a;
      --accent: #e94560;
      --accent-glow: rgba(233, 69, 96, 0.3);
      --green: #00d2a0;
      --green-glow: rgba(0, 210, 160, 0.2);
      --text: #eaeaea;
      --text-dim: #8888aa;
      --yellow: #ffd700;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px 20px 30px;
      text-align: center;
      position: relative;
      border-bottom: 1px solid var(--card-border);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 13px;
      color: var(--text-dim);
    }

    .settings-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
    }

    .reset-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
    }

    /* Total display */
    .total-section {
      text-align: center;
      padding: 30px 20px 20px;
    }

    .total-label {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .total-amount {
      font-size: 52px;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent-glow);
      direction: ltr;
      unicode-bidi: bidi-override;
      transition: all 0.3s ease;
    }

    .total-amount.pulse {
      transform: scale(1.08);
      text-shadow: 0 0 50px var(--accent-glow);
    }

    .currency {
      font-size: 24px;
      font-weight: 600;
      margin-right: 4px;
    }

    /* Progress bar to next milestone */
    .milestone-section {
      padding: 0 20px 20px;
    }

    .milestone-bar-container {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--card-border);
    }

    .milestone-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .milestone-info .next {
      color: var(--yellow);
      font-weight: 600;
    }

    .milestone-info .current {
      color: var(--text-dim);
    }

    .milestone-bar {
      height: 8px;
      background: #2a2a4a;
      border-radius: 4px;
      overflow: hidden;
    }

    .milestone-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--yellow));
      border-radius: 4px;
      transition: width 0.5s ease;
      min-width: 0;
    }

    /* SMS Input */
    .input-section {
      padding: 10px 20px 20px;
    }

    .sms-box {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--card-border);
      padding: 16px;
      transition: border-color 0.3s;
    }

    .sms-box.active {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .sms-box label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
    }

    .sms-textarea {
      width: 100%;
      min-height: 80px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      direction: rtl;
    }

    .sms-textarea::placeholder {
      color: var(--text-dim);
    }

    .sms-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .detected-amount {
      margin-top: 10px;
      padding: 10px 14px;
      background: var(--green-glow);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--green);
      display: none;
      align-items: center;
      gap: 8px;
    }

    .detected-amount.show {
      display: flex;
    }

    .add-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #c0392b);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
      display: none;
    }

    .add-btn.show {
      display: block;
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    /* Manual input */
    .manual-section {
      padding: 0 20px 10px;
      text-align: center;
    }

    .manual-toggle {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      padding: 8px;
    }

    .manual-input-row {
      display: none;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      padding: 0 20px 10px;
    }

    .manual-input-row.show {
      display: flex;
    }

    .manual-input {
      flex: 1;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      text-align: center;
      direction: ltr;
    }

    .manual-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .manual-add-btn {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    /* History */
    .history-section {
      padding: 10px 20px 100px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-header h2 {
      font-size: 16px;
      font-weight: 700;
    }

    .history-count {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--card);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .history-item .info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-item .amount {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      direction: ltr;
      text-align: right;
    }

    .history-item .time {
      font-size: 11px;
      color: var(--text-dim);
    }

    .history-item .running-total {
      font-size: 13px;
      color: var(--text-dim);
      direction: ltr;
      text-align: left;
    }

    .history-item .delete-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .history-item .delete-btn:active {
      background: rgba(233, 69, 96, 0.2);
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 14px;
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* Milestone notification popup */
    .milestone-popup {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .milestone-popup.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .milestone-popup-content {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid var(--yellow);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      max-width: 300px;
      width: 90%;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .milestone-popup .alert-icon {
      font-size: 50px;
      margin-bottom: 16px;
    }

    .milestone-popup .alert-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--yellow);
      margin-bottom: 8px;
    }

    .milestone-popup .alert-amount {
      font-size: 36px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 6px;
      direction: ltr;
    }

    .milestone-popup .alert-msg {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    .milestone-popup .close-btn {
      padding: 12px 40px;
      background: var(--yellow);
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    /* Settings modal */
    .settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
    }

    .settings-modal.show {
      display: flex;
    }

    .settings-content {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 500px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .settings-content h3 {
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--card-border);
    }

    .setting-row label {
      font-size: 14px;
    }

    .setting-row input {
      width: 100px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      text-align: center;
      font-family: inherit;
      direction: ltr;
    }

    .setting-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .settings-save {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .settings-close {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: none;
      color: var(--text-dim);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    /* Month selector */
    .month-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 10px 20px 0;
    }

    .month-selector button {
      background: var(--card);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .month-selector .month-label {
      font-size: 15px;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
    <button class="reset-btn" onclick="confirmReset()">איפוס חודש</button>
    <h1>💳 מעקב אשראי</h1>
    <div class="subtitle">מעקב הוצאות בזמן אמת מ-SMS</div>
  </div>

  <!-- Month selector -->
  <div class="month-selector">
    <button onclick="changeMonth(1)">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(-1)">›</button>
  </div>

  <!-- Total -->
  <div class="total-section">
    <div class="total-label">סה"כ הוצאות החודש</div>
    <div class="total-amount" id="totalAmount">
      <span class="currency">₪</span><span id="totalNum">0</span>
    </div>
  </div>

  <!-- Milestone progress -->
  <div class="milestone-section">
    <div class="milestone-bar-container">
      <div class="milestone-info">
        <span class="current" id="milestoneCurrentLabel">₪0 מתוך ₪1,000</span>
        <span class="next" id="milestoneNextLabel">🎯 התראה הבאה: ₪1,000</span>
      </div>
      <div class="milestone-bar">
        <div class="milestone-bar-fill" id="milestoneFill" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- SMS Input -->
  <div class="input-section">
    <div class="sms-box" id="smsBox">
      <label>📩 הדבק SMS מחברת האשראי</label>
      <textarea class="sms-textarea" id="smsInput" placeholder="הדבק כאן את הודעת ה-SMS...
לדוגמה: עסקה בכרטיס *1234 בסך 150.00 ש״ח אושרה ב-שופרסל"></textarea>
      <div class="detected-amount" id="detectedAmount">
        <span>✅ זוהה סכום:</span>
        <span id="detectedNum"></span>
      </div>
      <button class="add-btn" id="addBtn" onclick="addFromSMS()">➕ הוסף חיוב</button>
    </div>
  </div>

  <!-- Manual input toggle -->
  <div class="manual-section">
    <button class="manual-toggle" onclick="toggleManual()">או הזן סכום ידנית</button>
  </div>
  <div class="manual-input-row" id="manualRow">
    <input type="number" class="manual-input" id="manualInput" placeholder="סכום בש״ח" inputmode="decimal">
    <button class="manual-add-btn" onclick="addManual()">הוסף</button>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <h2>📋 היסטוריית חיובים</h2>
      <span class="history-count" id="historyCount">0 חיובים</span>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- Milestone popup -->
  <div class="milestone-popup" id="milestonePopup">
    <div class="milestone-popup-content">
      <div class="alert-icon">🚨</div>
      <div class="alert-title">התראת הוצאות!</div>
      <div class="alert-amount" id="popupAmount">₪1,000</div>
      <div class="alert-msg" id="popupMsg">הגעת לסכום מצטבר של 1,000 ש"ח החודש</div>
      <button class="close-btn" onclick="closeMilestone()">הבנתי</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="settings-modal" id="settingsModal">
    <div class="settings-content">
      <h3>⚙️ הגדרות</h3>
      <div class="setting-row">
        <label>התראה כל (ש"ח)</label>
        <input type="number" id="milestoneStep" value="1000" inputmode="numeric">
      </div>
      <div class="setting-row">
        <label>התראת פוש</label>
        <button id="pushToggle" onclick="requestPush()" style="padding:8px 16px; background:var(--green); color:#fff; border:none; border-radius:8px; font-family:inherit; cursor:pointer; font-size:13px;">הפעל</button>
      </div>
      <button class="settings-save" onclick="saveSettings()">שמור</button>
      <button class="settings-close" onclick="closeSettings()">סגור</button>
    </div>
  </div>

<script>
  const STORAGE_KEY = 'credit-tracker';
  const MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  let state = loadState();
  let viewMonth = getCurrentMonthKey();

  function getCurrentMonthKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function getMonthLabel(key) {
    const [y, m] = key.split('-');
    return `${MONTHS_HE[parseInt(m)-1]} ${y}`;
  }

  function defaultState() {
    return { milestoneStep: 1000, months: {}, pushEnabled: false };
  }

  function loadState() {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (s && s.months) return s;
    } catch(e) {}
    return defaultState();
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getMonthData(key) {
    if (!state.months[key]) {
      state.months[key] = { entries: [], lastMilestone: 0 };
    }
    return state.months[key];
  }

  function getTotal(key) {
    const data = getMonthData(key);
    return data.entries.reduce((sum, e) => sum + e.amount, 0);
  }

  // SMS amount extraction - supports multiple Israeli credit card SMS formats
  function extractAmount(text) {
    const patterns = [
      /(\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?)\s*(?:₪|ש"ח|ש״ח|שח|NIS|ILS)/i,
      /(?:₪|ש"ח|ש״ח|שח|NIS|ILS)\s*(\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?)/i,
      /(?:בסך|סכום|חויב|חיוב|עסקה)\s*(?:של\s*)?(\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?)/i,
      /(\d{1,3}(?:,\d{3})*\.\d{2})\s/,
    ];
    for (const p of patterns) {
      const m = text.match(p);
      if (m) {
        const num = parseFloat(m[1].replace(/,/g, ''));
        if (num > 0 && num < 1000000) return num;
      }
    }
    return null;
  }

  // Extract store/merchant name from SMS
  function extractStore(text) {
    const patterns = [
      /(?:ב|אצל|ב-)\s*([א-ת\w\s\-\.]+?)(?:\s+(?:בסך|סכום|ע"ס|על סך))/,
      /(?:אושרה|בוצעה)\s+(?:ב|ב-)\s*([א-ת\w\s\-\.]+?)(?:\s|$)/,
    ];
    for (const p of patterns) {
      const m = text.match(p);
      if (m && m[1].trim().length > 1) return m[1].trim().substring(0, 30);
    }
    return null;
  }

  // UI Updates
  function updateUI() {
    const total = getTotal(viewMonth);
    const data = getMonthData(viewMonth);
    const step = state.milestoneStep || 1000;
    const nextMilestone = (Math.floor(total / step) + 1) * step;
    const prevMilestone = Math.floor(total / step) * step;
    const progress = step > 0 ? ((total - prevMilestone) / step) * 100 : 0;

    document.getElementById('totalNum').textContent = formatNum(total);
    document.getElementById('monthLabel').textContent = getMonthLabel(viewMonth);

    document.getElementById('milestoneCurrentLabel').textContent = `₪${formatNum(total)} מתוך ₪${formatNum(nextMilestone)}`;
    document.getElementById('milestoneNextLabel').textContent = `🎯 התראה הבאה: ₪${formatNum(nextMilestone)}`;
    document.getElementById('milestoneFill').style.width = Math.min(progress, 100) + '%';

    document.getElementById('milestoneStep').value = step;

    // History
    const list = document.getElementById('historyList');
    const entries = [...data.entries].reverse();
    document.getElementById('historyCount').textContent = `${entries.length} חיובים`;

    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">💳</div>עדיין אין חיובים החודש<br>הדבק SMS מהאשראי להתחיל</div>';
      return;
    }

    let runningTotal = total;
    list.innerHTML = entries.map((e, i) => {
      const rt = runningTotal;
      runningTotal -= e.amount;
      const realIndex = entries.length - 1 - i;
      const time = new Date(e.time).toLocaleString('he-IL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      const store = e.store ? `<span style="font-size:12px; color:var(--text-dim)"> • ${e.store}</span>` : '';
      return `<div class="history-item">
        <div class="info">
          <div class="amount">₪${formatNum(e.amount)}${store}</div>
          <div class="time">${time}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <div class="running-total">₪${formatNum(rt)}</div>
          <button class="delete-btn" onclick="deleteEntry('${viewMonth}', ${realIndex})">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  function formatNum(n) {
    return n.toLocaleString('he-IL', { maximumFractionDigits: 2 });
  }

  // SMS handling
  const smsInput = document.getElementById('smsInput');
  let detectedAmt = null;

  smsInput.addEventListener('input', () => {
    const text = smsInput.value;
    const amt = extractAmount(text);
    const box = document.getElementById('smsBox');
    const det = document.getElementById('detectedAmount');
    const btn = document.getElementById('addBtn');

    if (amt) {
      detectedAmt = amt;
      document.getElementById('detectedNum').textContent = `₪${formatNum(amt)}`;
      det.classList.add('show');
      btn.classList.add('show');
      box.classList.add('active');
    } else {
      detectedAmt = null;
      det.classList.remove('show');
      btn.classList.remove('show');
      box.classList.remove('active');
    }
  });

  function addFromSMS() {
    if (!detectedAmt) return;
    const store = extractStore(smsInput.value);
    addEntry(detectedAmt, store);
    smsInput.value = '';
    detectedAmt = null;
    document.getElementById('detectedAmount').classList.remove('show');
    document.getElementById('addBtn').classList.remove('show');
    document.getElementById('smsBox').classList.remove('active');
  }

  function addManual() {
    const input = document.getElementById('manualInput');
    const amt = parseFloat(input.value);
    if (!amt || amt <= 0) return;
    addEntry(amt, null);
    input.value = '';
  }

  function addEntry(amount, store) {
    const monthKey = getCurrentMonthKey();
    const data = getMonthData(monthKey);
    data.entries.push({ amount, store, time: Date.now() });

    const newTotal = getTotal(monthKey);
    const step = state.milestoneStep || 1000;
    const currentMilestone = Math.floor(newTotal / step) * step;

    if (currentMilestone > data.lastMilestone && currentMilestone > 0) {
      data.lastMilestone = currentMilestone;
      triggerMilestoneAlert(currentMilestone, newTotal);
    }

    saveState();

    if (viewMonth !== monthKey) {
      viewMonth = monthKey;
    }
    updateUI();

    // Pulse animation
    const el = document.getElementById('totalAmount');
    el.classList.add('pulse');
    setTimeout(() => el.classList.remove('pulse'), 400);
  }

  function deleteEntry(monthKey, index) {
    const data = getMonthData(monthKey);
    if (index >= 0 && index < data.entries.length) {
      data.entries.splice(index, 1);
      const newTotal = getTotal(monthKey);
      const step = state.milestoneStep || 1000;
      data.lastMilestone = Math.floor(newTotal / step) * step;
      saveState();
      updateUI();
    }
  }

  function triggerMilestoneAlert(milestone, total) {
    // In-app popup
    document.getElementById('popupAmount').textContent = `₪${formatNum(milestone)}`;
    document.getElementById('popupMsg').textContent = `הגעת לסכום מצטבר של ${formatNum(milestone)} ש"ח החודש`;
    document.getElementById('milestonePopup').classList.add('show');

    // Vibrate
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);

    // Push notification
    if (Notification.permission === 'granted') {
      try {
        const reg = window._swReg;
        if (reg) {
          reg.showNotification('🚨 התראת הוצאות!', {
            body: `הגעת ל-₪${formatNum(milestone)} הוצאות החודש!`,
            icon: 'icons/credit-icon-192.png',
            badge: 'icons/credit-icon-192.png',
            vibrate: [200, 100, 200],
            tag: 'milestone-' + milestone,
          });
        } else {
          new Notification('🚨 התראת הוצאות!', {
            body: `הגעת ל-₪${formatNum(milestone)} הוצאות החודש!`,
            icon: 'icons/credit-icon-192.png',
          });
        }
      } catch(e) {
        console.log('Notification error:', e);
      }
    }
  }

  function closeMilestone() {
    document.getElementById('milestonePopup').classList.remove('show');
  }

  // Month navigation
  function changeMonth(dir) {
    const [y, m] = viewMonth.split('-').map(Number);
    let newM = m + dir;
    let newY = y;
    if (newM > 12) { newM = 1; newY++; }
    if (newM < 1) { newM = 12; newY--; }
    viewMonth = `${newY}-${String(newM).padStart(2,'0')}`;
    updateUI();
  }

  // Manual input toggle
  function toggleManual() {
    document.getElementById('manualRow').classList.toggle('show');
  }

  // Settings
  function openSettings() {
    document.getElementById('settingsModal').classList.add('show');
    updatePushButton();
  }

  function closeSettings() {
    document.getElementById('settingsModal').classList.remove('show');
  }

  function saveSettings() {
    const step = parseInt(document.getElementById('milestoneStep').value);
    if (step && step > 0) {
      state.milestoneStep = step;
      // Recalculate lastMilestone for current month
      const monthKey = getCurrentMonthKey();
      const data = getMonthData(monthKey);
      const total = getTotal(monthKey);
      data.lastMilestone = Math.floor(total / step) * step;
      saveState();
      updateUI();
    }
    closeSettings();
  }

  async function requestPush() {
    if (!('Notification' in window)) {
      alert('הדפדפן לא תומך בהתראות פוש');
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      state.pushEnabled = true;
      saveState();
      updatePushButton();
    }
  }

  function updatePushButton() {
    const btn = document.getElementById('pushToggle');
    if (Notification.permission === 'granted') {
      btn.textContent = '✅ פעיל';
      btn.style.background = 'var(--green)';
    } else if (Notification.permission === 'denied') {
      btn.textContent = '❌ חסום';
      btn.style.background = '#555';
    } else {
      btn.textContent = 'הפעל';
      btn.style.background = 'var(--accent)';
    }
  }

  function confirmReset() {
    if (confirm(`לאפס את כל החיובים של ${getMonthLabel(viewMonth)}?`)) {
      state.months[viewMonth] = { entries: [], lastMilestone: 0 };
      saveState();
      updateUI();
    }
  }

  // Enter key for manual input
  document.getElementById('manualInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addManual();
  });

  // Service Worker for push
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw-credit.js').then(reg => {
      window._swReg = reg;
    }).catch(() => {});
  }

  // Init
  updateUI();
</script>
</body>
</html>
